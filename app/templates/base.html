<!DOCTYPE html>
<html lang="ru-en">

<head>
    {% load static %}
    <meta charset="UTF-8">
    <title>{% block title %}Title{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="text-center text-bg-dark" style="min-height: 100vh;">
    <nav class="navbar navbar-dark justify-content-center">
        <div class="container-fluid">
            <div class="collapse navbar-collapse d-lg-flex">
                <a class="navbar-brand col-lg-3 me-0" href="{% url 'home' page_id=1 %}">News</a>
                <ul class="navbar-nav col-lg-6 justify-content-lg-center" style="flex-direction: row;">
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'home' page_id=1 %}">Лента</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'add' %}">Запостить</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4 px-4" style="min-height: 89vh;">
        <div class="col-11 col-md-8 col-lg-6 mx-auto">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="mt-auto py-3">
        © 2026 News
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>

</html>
